<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Set your password — HR Tool</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="assets/styles.css">
</head>
<body>
<div class="login-shell">
  <div class="login-card">
    <h1>Set your password</h1>
    <p class="sub" id="welcome">First-time setup — pick a password you'll use to sign in next time.</p>

    <form id="form">
      <label>New password</label>
      <input type="password" id="p1" required minlength="8" placeholder="At least 8 characters" autocomplete="new-password">
      <label>Confirm password</label>
      <input type="password" id="p2" required minlength="8" autocomplete="new-password">
      <div style="margin-top:18px"><button type="submit" id="saveBtn" style="width:100%">Save and continue</button></div>
      <div class="error" id="err"></div>
    </form>
  </div>
</div>

<script type="module">
  import { auth, db } from "./assets/firebase-init.js";
  import { onAuthStateChanged, updatePassword } from "https://www.gstatic.com/firebasejs/10.13.0/firebase-auth.js";
  import { doc, getDoc, updateDoc } from "https://www.gstatic.com/firebasejs/10.13.0/firebase-firestore.js";

  const errEl = document.getElementById("err");
  const saveBtn = document.getElementById("saveBtn");
  const BASE = location.pathname.replace(/set-password\.html$/, "");

  // Must be signed in to use this page
  let currentUser = await new Promise((resolve) => {
    onAuthStateChanged(auth, (u) => resolve(u));
  });
  if (!currentUser) { location.replace(BASE + "login.html"); }
  else {
    const snap = await getDoc(doc(db, "users", currentUser.uid));
    if (snap.exists()) {
      document.getElementById("welcome").textContent =
        `Welcome ${snap.data().name || ""} — set a password you'll use to sign in next time.`;
    }
  }

  document.getElementById("form").addEventListener("submit", async (e) => {
    e.preventDefault();
    errEl.textContent = "";
    const p1 = document.getElementById("p1").value;
    const p2 = document.getElementById("p2").value;
    if (p1 !== p2) { errEl.textContent = "Passwords don't match."; return; }
    if (p1.length < 8) { errEl.textContent = "Use at least 8 characters."; return; }

    saveBtn.disabled = true; saveBtn.textContent = "Saving…";
    try {
      await updatePassword(currentUser, p1);
      await updateDoc(doc(db, "users", currentUser.uid), {
        mustChangePassword: false,
        updatedAt: new Date().toISOString()
      });
      location.replace(BASE);
    } catch (ex) {
      if (ex.code === "auth/requires-recent-login") {
        errEl.textContent = "Your session is too old — sign out and back in with the temp password, then try again.";
      } else {
        errEl.textContent = "Could not save: " + (ex.message || ex.code);
      }
      saveBtn.disabled = false; saveBtn.textContent = "Save and continue";
    }
  });
</script>
</body>
</html>
