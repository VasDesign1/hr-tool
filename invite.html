<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Welcome to HR Tool</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="assets/styles.css">
</head>
<body>
<div class="login-shell">
  <div class="login-card">
    <h1>HR Tool</h1>
    <p class="sub" id="status">Verifying your invite…</p>

    <!-- Step: ask for email if not in URL (cross-device case) -->
    <form id="emailForm" style="display:none">
      <label>Confirm your email</label>
      <input type="email" id="emailInput" required>
      <div style="margin-top:18px"><button type="submit" style="width:100%">Continue</button></div>
      <div class="error" id="emailErr"></div>
    </form>

    <!-- Step: set password -->
    <form id="passwordForm" style="display:none">
      <label>Welcome <span id="welcomeName"></span> — set your password</label>
      <input type="password" id="newPassword" required minlength="8" placeholder="At least 8 characters">
      <label>Confirm password</label>
      <input type="password" id="confirmPassword" required minlength="8">
      <div style="margin-top:18px"><button type="submit" id="finishBtn" style="width:100%">Finish setup</button></div>
      <div class="error" id="passErr"></div>
    </form>
  </div>
</div>

<script type="module">
  import { auth, db } from "./assets/firebase-init.js";
  import {
    isSignInWithEmailLink,
    signInWithEmailLink,
    updatePassword
  } from "https://www.gstatic.com/firebasejs/10.13.0/firebase-auth.js";
  import { doc, getDoc, setDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.13.0/firebase-firestore.js";

  const status = document.getElementById("status");
  const emailForm = document.getElementById("emailForm");
  const passwordForm = document.getElementById("passwordForm");

  const link = window.location.href;
  if (!isSignInWithEmailLink(auth, link)) {
    status.textContent = "This link is no longer valid. Ask your admin to send a new invite.";
    status.style.color = "var(--bad)";
  } else {
    // Try to find the email from query string first, then from prior localStorage
    const url = new URL(link);
    let email = url.searchParams.get("email") || window.localStorage.getItem("hrInviteEmail") || "";

    if (email) {
      await completeSignIn(email);
    } else {
      status.textContent = "Confirm the email this invite was sent to:";
      emailForm.style.display = "block";
      emailForm.addEventListener("submit", async (e) => {
        e.preventDefault();
        await completeSignIn(document.getElementById("emailInput").value.trim().toLowerCase());
      });
    }
  }

  async function completeSignIn(email) {
    status.textContent = "Verifying…";
    emailForm.style.display = "none";
    try {
      await signInWithEmailLink(auth, email, link);
    } catch (ex) {
      status.textContent = "We couldn't verify that invite. " + (ex.code || ex.message);
      status.style.color = "var(--bad)";
      return;
    }
    const inviteSnap = await getDoc(doc(db, "invites", email));
    if (!inviteSnap.exists()) {
      status.textContent = "Your invite has already been used or was cancelled. Contact your admin.";
      status.style.color = "var(--bad)";
      return;
    }
    const invite = inviteSnap.data();
    document.getElementById("welcomeName").textContent = invite.name || "";

    // Create user profile doc (allowed by rule because invite exists for this email)
    try {
      await setDoc(doc(db, "users", auth.currentUser.uid), {
        email: email,
        name: invite.name,
        role: "contractor",
        active: true,
        startDate: new Date().toISOString().slice(0, 10)
      });
      await deleteDoc(doc(db, "invites", email));
    } catch (ex) {
      status.textContent = "Could not finish setting up your profile: " + (ex.message || ex.code);
      status.style.color = "var(--bad)";
      return;
    }

    status.textContent = "One last step — pick a password you'll use to sign in next time.";
    passwordForm.style.display = "block";
  }

  passwordForm.addEventListener("submit", async (e) => {
    e.preventDefault();
    const p1 = document.getElementById("newPassword").value;
    const p2 = document.getElementById("confirmPassword").value;
    const errEl = document.getElementById("passErr");
    const btn = document.getElementById("finishBtn");
    errEl.textContent = "";
    if (p1 !== p2) { errEl.textContent = "Passwords don't match."; return; }
    btn.disabled = true; btn.textContent = "Saving…";
    try {
      await updatePassword(auth.currentUser, p1);
      window.localStorage.removeItem("hrInviteEmail");
      // Land them in the contractor app
      const base = location.pathname.replace(/invite\.html$/, "");
      location.replace(base + "app/");
    } catch (ex) {
      errEl.textContent = "Could not save password: " + (ex.message || ex.code);
      btn.disabled = false; btn.textContent = "Finish setup";
    }
  });
</script>
</body>
</html>
