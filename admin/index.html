<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Dashboard — Vic Air HR</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../assets/styles.css">
</head>
<body>
<header class="topbar"></header>

<main>
  <div class="page-header">
    <div>
      <h1 class="page-title">Dashboard</h1>
      <div class="page-subtitle" id="todaySub">—</div>
    </div>
  </div>

  <div class="card">
    <h2>Who's clocked in</h2>
    <div id="liveList" class="empty">Loading…</div>
  </div>
</main>

<script type="module">
  import { db } from "../assets/firebase-init.js";
  import { requireRole } from "../assets/auth-router.js";
  import { renderAdminNav, escapeHtml } from "../assets/admin-nav.js";
  import { melTimeShort, fmtHours, hoursBetween } from "../assets/time.js";
  import { collection, query, where, onSnapshot } from "https://www.gstatic.com/firebasejs/10.13.0/firebase-firestore.js";

  const { profile } = await requireRole("admin");
  renderAdminNav(profile, "dashboard");

  document.getElementById("todaySub").textContent =
    new Date().toLocaleDateString("en-AU", { timeZone: "Australia/Melbourne", weekday: "long", day: "numeric", month: "long", year: "numeric" });

  const liveEl = document.getElementById("liveList");

  function startLive() {
    onSnapshot(
      query(collection(db, "users"), where("role", "==", "contractor"), where("active", "==", true)),
      (snap) => {
        const active = [];
        snap.forEach(d => {
          const u = d.data();
          if (u.currentEntryId && u.clockedInAt) {
            active.push({ uid: d.id, name: u.name || u.email, start: u.clockedInAt.toDate() });
          }
        });
        if (active.length === 0) {
          liveEl.classList.add("empty");
          liveEl.innerHTML = "Nobody is clocked in right now.";
          return;
        }
        liveEl.classList.remove("empty");
        liveEl.innerHTML = `<div class="live-list">${active.map(a => {
          const initials = (a.name || "?").split(/[\s@]+/).filter(Boolean).slice(0,2).map(s=>s[0]).join("").toUpperCase().slice(0,2);
          return `
          <div class="live-row" data-start="${a.start.getTime()}">
            <div class="who">
              <div class="avatar">${initials || "?"}</div>
              <div>
                <div class="name">${escapeHtml(a.name)}</div>
                <div class="since">since ${melTimeShort(a.start)} Melbourne</div>
              </div>
            </div>
            <div class="elapsed" data-elapsed>—</div>
          </div>`;
        }).join("")}</div>`;
        tickElapsed();
      },
      (err) => { console.error("Live board:", err); }
    );
  }

  function fmtElapsed(ms) {
    const totalSec = Math.floor(ms / 1000);
    const h = String(Math.floor(totalSec / 3600)).padStart(2, "0");
    const m = String(Math.floor((totalSec % 3600) / 60)).padStart(2, "0");
    const s = String(totalSec % 60).padStart(2, "0");
    return `${h}:${m}:${s}`;
  }

  function tickElapsed() {
    const now = Date.now();
    liveEl.querySelectorAll(".live-row").forEach(row => {
      const start = Number(row.dataset.start);
      row.querySelector("[data-elapsed]").textContent = fmtElapsed(now - start);
    });
  }

  startLive();
  setInterval(tickElapsed, 1000);
</script>
</body>
</html>
