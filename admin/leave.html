<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Leave — HR Tool Admin</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../assets/styles.css">
</head>
<body>
<header class="topbar"></header>

<main>
  <!-- Team calendar -->
  <div class="card">
    <div class="toolbar">
      <h2>Team calendar</h2>
      <span class="muted" style="font-size:12px">Click any pending entry to approve / deny</span>
    </div>
    <div id="teamCalendar"></div>
    <div class="cal-legend">
      <span class="lg pending"><span class="swatch"></span>Pending</span>
      <span class="lg approved"><span class="swatch"></span>Approved</span>
      <span class="lg denied"><span class="swatch"></span>Denied</span>
      <span class="lg cancelled"><span class="swatch"></span>Cancelled</span>
      <span class="lg holiday"><span class="swatch"></span>Vic public holiday</span>
    </div>
  </div>

  <!-- Pending queue -->
  <div class="card">
    <div class="toolbar">
      <h2>Pending requests</h2>
      <span class="muted" style="font-size:13px" id="pendingCount"></span>
    </div>
    <div id="pendingList" class="empty">Loading…</div>
  </div>

  <!-- Upcoming approved -->
  <div class="card">
    <div class="toolbar">
      <h2>Upcoming approved leave</h2>
    </div>
    <div id="upcomingList" class="empty">Loading…</div>
  </div>

  <!-- Balances overview -->
  <div class="card">
    <div class="toolbar">
      <h2>Balances</h2>
      <button id="bulkAccrueBtn" class="ghost">+ Add this week's accrual to all</button>
    </div>
    <div id="balancesList" class="empty">Loading…</div>
  </div>

  <!-- Full leave history (all decisions logged) -->
  <div class="card">
    <div class="toolbar">
      <h2>All leave requests</h2>
      <span class="muted" style="font-size:12px">Submitted / approved / denied dates</span>
    </div>
    <div id="historyList" class="empty">Loading…</div>
  </div>
</main>

<!-- Decision modal -->
<div class="modal-backdrop" id="decisionModal">
  <div class="modal">
    <h2 id="decisionTitle">Approve request</h2>
    <div id="decisionDetails" style="margin-bottom:12px; font-size:14px"></div>
    <label>Note <span class="muted" style="font-size:11px">(optional, visible to contractor)</span></label>
    <textarea id="decisionNote" rows="2"></textarea>
    <div class="error" id="decisionErr"></div>
    <div class="actions">
      <button type="button" class="ghost" id="decisionCancel">Cancel</button>
      <button type="button" id="decisionConfirm">Confirm</button>
    </div>
  </div>
</div>

<script type="module">
  import { db } from "../assets/firebase-init.js";
  import { requireRole } from "../assets/auth-router.js";
  import { renderAdminNav, escapeHtml } from "../assets/admin-nav.js";
  import { fmtDay, melDateKey, fmtDateShort } from "../assets/time.js";
  // melDateKey already imported above; no-op safeguard
  import { computeBalance, fmtLeave } from "../assets/leave.js";
  import { renderCalendar } from "../assets/calendar.js";
  import { holidaysAsCalendarEntries } from "../assets/holidays.js";
  import {
    collection, query, where, getDocs, doc, updateDoc, serverTimestamp, orderBy, onSnapshot, writeBatch
  } from "https://www.gstatic.com/firebasejs/10.13.0/firebase-firestore.js";

  const { profile } = await requireRole(["admin", "viewer"]);
  const canWrite = profile.role === "admin";
  if (!canWrite) document.body.classList.add("viewer-mode");
  renderAdminNav(profile, "leave");

  // ---- Load contractors once ----
  const usnap = await getDocs(query(collection(db, "users"), where("role", "==", "contractor")));
  const usersByUid = {};
  usnap.forEach(d => usersByUid[d.id] = { uid: d.id, ...d.data() });
  // Helper — true when the leave request belongs to a test account that should be hidden
  const isTestRequest = (r) => !!usersByUid[r.uid]?.testAccount;

  // ---- Pending queue (live) ----
  function startPendingLive() {
    onSnapshot(
      query(collection(db, "leaveRequests"), where("status", "==", "pending")),
      (snap) => renderPending(snap),
      (err) => console.error("pending:", err)
    );
  }
  function renderPending(snap) {
    const listEl = document.getElementById("pendingList");
    const reqs = [];
    snap.forEach(d => {
      const r = { id: d.id, ...d.data() };
      if (isTestRequest(r)) return;  // hide test accounts from queue
      reqs.push(r);
    });
    reqs.sort((a, b) => (a.submittedAt?.toMillis?.() || 0) - (b.submittedAt?.toMillis?.() || 0));

    document.getElementById("pendingCount").textContent = reqs.length === 0 ? "" : `${reqs.length} waiting`;

    if (reqs.length === 0) {
      listEl.classList.add("empty");
      listEl.innerHTML = "No pending requests.";
      return;
    }
    listEl.classList.remove("empty");
    listEl.innerHTML = `<table class="data">
      <thead>
        <tr><th>Contractor</th><th>Dates</th><th>Hours</th><th>Reason</th><th>Submitted</th><th></th></tr>
      </thead>
      <tbody>
        ${reqs.map(r => {
          const u = usersByUid[r.uid];
          const range = r.startDate === r.endDate
            ? fmtDay(r.startDate)
            : `${fmtDay(r.startDate)} → ${fmtDay(r.endDate)}`;
          const halfNote = (r.halfDayStart || r.halfDayEnd) ? ` <span class="muted" style="font-size:11px">(½ day)</span>` : "";
          const submitted = r.submittedAt?.toDate?.()?.toLocaleString("en-AU", { timeZone: "Australia/Melbourne", hour12: false }) || "—";
          return `<tr>
            <td>${escapeHtml(u?.name || r.requesterName || "—")}</td>
            <td>${range}${halfNote}</td>
            <td>${fmtLeave(r.hours)}</td>
            <td class="muted" style="font-size:13px; max-width:240px">${escapeHtml(r.reason || "—")}</td>
            <td class="muted" style="font-size:12px">${submitted}</td>
            <td>
              <div class="actions">
                <button data-act="approve" data-id="${r.id}">Approve</button>
                <button class="ghost" data-act="deny" data-id="${r.id}">Deny</button>
              </div>
            </td>
          </tr>`;
        }).join("")}
      </tbody>
    </table>`;

    listEl.querySelectorAll("button[data-act]").forEach(btn => {
      btn.addEventListener("click", () => openDecision(btn.dataset.act, btn.dataset.id, reqs.find(r => r.id === btn.dataset.id)));
    });
  }

  // ---- Decision modal ----
  let pendingDecision = null;
  function openDecision(act, id, req) {
    pendingDecision = { act, id };
    const u = usersByUid[req.uid];
    document.getElementById("decisionTitle").textContent = act === "approve" ? "Approve request" : "Deny request";
    const range = req.startDate === req.endDate
      ? fmtDay(req.startDate)
      : `${fmtDay(req.startDate)} → ${fmtDay(req.endDate)}`;
    document.getElementById("decisionDetails").innerHTML = `
      <strong>${escapeHtml(u?.name || req.requesterName)}</strong>
      <div class="muted" style="margin-top:4px">${range} · ${fmtLeave(req.hours)}</div>
      ${req.reason ? `<div class="muted" style="margin-top:6px; font-size:13px">"${escapeHtml(req.reason)}"</div>` : ""}
    `;
    document.getElementById("decisionNote").value = "";
    document.getElementById("decisionErr").textContent = "";
    document.getElementById("decisionConfirm").textContent = act === "approve" ? "Approve" : "Deny";
    document.getElementById("decisionConfirm").className = act === "approve" ? "" : "danger";
    document.getElementById("decisionModal").classList.add("open");
  }
  document.getElementById("decisionCancel").addEventListener("click", () => {
    document.getElementById("decisionModal").classList.remove("open");
  });
  document.getElementById("decisionConfirm").addEventListener("click", async () => {
    if (!pendingDecision) return;
    const btn = document.getElementById("decisionConfirm");
    btn.disabled = true;
    try {
      await updateDoc(doc(db, "leaveRequests", pendingDecision.id), {
        status: pendingDecision.act === "approve" ? "approved" : "denied",
        adminNote: document.getElementById("decisionNote").value.trim() || null,
        decidedBy: profile.email,
        decidedAt: serverTimestamp()
      });
      document.getElementById("decisionModal").classList.remove("open");
      // pending list updates via onSnapshot automatically
      loadUpcoming();
      loadBalances();
      loadCalendar();
      loadHistory();
    } catch (ex) {
      document.getElementById("decisionErr").textContent = "Failed: " + (ex.message || ex.code);
    } finally {
      btn.disabled = false;
    }
  });

  // ---- Upcoming approved ----
  async function loadUpcoming() {
    const listEl = document.getElementById("upcomingList");
    listEl.innerHTML = `<div class="empty">Loading…</div>`;
    const todayKey = melDateKey();
    const snap = await getDocs(query(
      collection(db, "leaveRequests"),
      where("status", "==", "approved")
    ));
    const upcoming = [];
    snap.forEach(d => {
      const r = { id: d.id, ...d.data() };
      if (isTestRequest(r)) return;  // hide test accounts
      if (r.endDate >= todayKey) upcoming.push(r);
    });
    upcoming.sort((a, b) => a.startDate.localeCompare(b.startDate));

    if (upcoming.length === 0) {
      listEl.classList.add("empty");
      listEl.innerHTML = "Nothing approved coming up.";
      return;
    }
    listEl.classList.remove("empty");
    listEl.innerHTML = `<table class="data">
      <thead><tr><th>Contractor</th><th>Dates</th><th>Hours</th><th>Reason</th></tr></thead>
      <tbody>
        ${upcoming.map(r => {
          const u = usersByUid[r.uid];
          const range = r.startDate === r.endDate
            ? fmtDay(r.startDate)
            : `${fmtDay(r.startDate)} → ${fmtDay(r.endDate)}`;
          return `<tr>
            <td>${escapeHtml(u?.name || r.requesterName || "—")}</td>
            <td>${range}</td>
            <td>${fmtLeave(r.hours)}</td>
            <td class="muted" style="font-size:13px">${escapeHtml(r.reason || "—")}</td>
          </tr>`;
        }).join("")}
      </tbody>
    </table>`;
  }

  // ---- Balances (per contractor) ----
  async function loadBalances() {
    const listEl = document.getElementById("balancesList");
    listEl.innerHTML = `<div class="empty">Loading…</div>`;
    const uids = Object.keys(usersByUid).filter(u => usersByUid[u].active !== false && !usersByUid[u].testAccount);
    if (uids.length === 0) {
      listEl.classList.add("empty");
      listEl.innerHTML = "No active contractors.";
      return;
    }
    const rows = await Promise.all(uids.map(async (uid) => {
      const [teSnap, lrSnap] = await Promise.all([
        getDocs(query(collection(db, "timeEntries"), where("uid", "==", uid))),
        getDocs(query(collection(db, "leaveRequests"), where("uid", "==", uid), where("status", "==", "approved")))
      ]);
      const timeEntries = [];
      teSnap.forEach(d => timeEntries.push(d.data()));
      const approved = [];
      lrSnap.forEach(d => approved.push(d.data()));
      const b = computeBalance(timeEntries, approved, usersByUid[uid]);
      return { user: usersByUid[uid], ...b };
    }));

    listEl.classList.remove("empty");
    listEl.innerHTML = `<table class="data">
      <thead><tr><th>Contractor</th><th>Available</th><th>Accrued</th><th>Taken</th></tr></thead>
      <tbody>
        ${rows.map(r => `<tr>
          <td>${escapeHtml(r.user.name || r.user.email)}</td>
          <td><strong>${fmtLeave(r.balance)}</strong></td>
          <td class="muted">${fmtLeave(r.accrued)}</td>
          <td class="muted">${fmtLeave(r.taken)}</td>
        </tr>`).join("")}
      </tbody>
    </table>`;
  }

  // ---- Team calendar ----
  async function loadCalendar() {
    const snap = await getDocs(collection(db, "leaveRequests"));
    const entries = [];
    snap.forEach(d => {
      const r = { id: d.id, ...d.data() };
      if (r.status === "cancelled") return; // hide cancelled from team calendar to reduce clutter
      if (isTestRequest(r)) return; // hide test accounts from team calendar
      const u = usersByUid[r.uid];
      const shortName = (u?.name || r.requesterName || "?")
        .split(" ")[0]; // first name only to fit in calendar cell
      const submitted = r.submittedAt?.toDate?.();
      const decided   = r.decidedAt?.toDate?.();
      const range = r.startDate === r.endDate ? r.startDate : `${r.startDate} → ${r.endDate}`;
      const lines = [
        `${u?.name || r.requesterName}`,
        `${r.status.toUpperCase()} · ${fmtLeave(r.hours)}`,
        range,
        submitted ? `Requested: ${fmtDateShort(submitted)}` : null,
        (r.status === "approved" || r.status === "denied") && decided
          ? `${r.status === "approved" ? "Approved" : "Denied"}: ${fmtDateShort(decided)}${r.decidedBy ? " by " + r.decidedBy : ""}` : null,
        r.reason ? `Reason: ${r.reason}` : null,
        r.adminNote ? `Admin note: ${r.adminNote}` : null
      ].filter(Boolean);
      entries.push({
        id: r.id,
        startDate: r.startDate,
        endDate: r.endDate,
        status: r.status,
        label: shortName,
        tooltip: lines.join("\n"),
        full: r
      });
    });
    const allEntries = [...holidaysAsCalendarEntries(), ...entries];
    renderCalendar(document.getElementById("teamCalendar"), {
      entries: allEntries,
      onClickEntry: (entry) => {
        if (entry.isHoliday) return;
        if (!canWrite) { alert(entry.tooltip); return; }
        if (entry.full.status === "pending") {
          openDecision("approve", entry.id, entry.full);
        } else {
          alert(entry.tooltip);
        }
      }
    });
  }

  async function loadHistory() {
    const listEl = document.getElementById("historyList");
    const snap = await getDocs(collection(db, "leaveRequests"));
    const reqs = [];
    snap.forEach(d => {
      const r = { id: d.id, ...d.data() };
      if (isTestRequest(r)) return; // hide test accounts from history
      reqs.push(r);
    });
    if (reqs.length === 0) {
      listEl.classList.add("empty");
      listEl.innerHTML = "No leave requests in the system yet.";
      return;
    }
    reqs.sort((a, b) => (b.submittedAt?.toMillis?.() || 0) - (a.submittedAt?.toMillis?.() || 0));
    listEl.classList.remove("empty");
    listEl.innerHTML = `<table class="data">
      <thead><tr>
        <th>Contractor</th>
        <th>Dates</th>
        <th>Hours</th>
        <th>Status</th>
        <th>Submitted</th>
        <th>Decided</th>
        <th>Reason / note</th>
      </tr></thead>
      <tbody>${reqs.map(r => {
        const u = usersByUid[r.uid];
        const range = r.startDate === r.endDate ? fmtDay(r.startDate) : `${fmtDay(r.startDate)} → ${fmtDay(r.endDate)}`;
        const submitted = r.submittedAt?.toDate?.()?.toLocaleString("en-AU", { timeZone: "Australia/Melbourne", hour12: false }) || "—";
        const decided = r.decidedAt?.toDate?.()?.toLocaleString("en-AU", { timeZone: "Australia/Melbourne", hour12: false });
        const decidedTxt = decided
          ? `<div>${decided}</div>${r.decidedBy ? `<div class="muted" style="font-size:11px">by ${escapeHtml(r.decidedBy)}</div>` : ""}`
          : `<span class="muted">—</span>`;
        const badge = r.status === "approved"  ? `<span class="badge ok">Approved</span>`
                    : r.status === "denied"    ? `<span class="badge bad">Denied</span>`
                    : r.status === "cancelled" ? `<span class="badge off">Cancelled</span>`
                    : `<span class="badge pending">Pending</span>`;
        const reasonHtml = r.reason
          ? `<div class="muted" style="font-size:13px">${escapeHtml(r.reason)}</div>`
          : `<span class="muted">—</span>`;
        const noteHtml = r.adminNote ? `<div class="muted" style="font-size:11px; margin-top:4px"><em>Admin: ${escapeHtml(r.adminNote)}</em></div>` : "";
        return `<tr>
          <td>${escapeHtml(u?.name || r.requesterName || "—")}</td>
          <td>${range}</td>
          <td>${fmtLeave(r.hours)}</td>
          <td>${badge}</td>
          <td class="muted" style="font-size:12px">${submitted}</td>
          <td class="muted" style="font-size:12px">${decidedTxt}</td>
          <td>${reasonHtml}${noteHtml}</td>
        </tr>`;
      }).join("")}</tbody>
    </table>`;
  }

  // One-click bulk: add a week's worth of accrual (0.385 days ≈ 2.92h) to every active
  // non-test contractor whose accrual has already started (start date ≤ this week's Monday).
  // Contractors whose accrual starts in the future (e.g. Luis on 2026-07-01) are skipped.
  document.getElementById("bulkAccrueBtn").addEventListener("click", async () => {
    // Find Monday of the current Melbourne week
    const todayKey = melDateKey();
    const [ty, tm, td] = todayKey.split("-").map(Number);
    const todayMs = Date.UTC(ty, tm - 1, td);
    const dow = (new Date(todayMs).getUTCDay() + 6) % 7;
    const monMs = todayMs - dow * 86_400_000;
    const monDt = new Date(monMs);
    const thisMondayKey = `${monDt.getUTCFullYear()}-${String(monDt.getUTCMonth()+1).padStart(2,"0")}-${String(monDt.getUTCDate()).padStart(2,"0")}`;

    const eligible = Object.values(usersByUid).filter(u =>
      u.active !== false &&
      !u.testAccount &&
      u.accrualStartDate &&
      u.accrualStartDate <= thisMondayKey
    );
    const skipped = Object.values(usersByUid).filter(u =>
      u.active !== false && !u.testAccount && (!u.accrualStartDate || u.accrualStartDate > thisMondayKey)
    );

    if (eligible.length === 0) {
      alert("No contractors are eligible for this week's accrual (accrual either not started or starts in the future).");
      return;
    }
    const names = eligible.map(u => u.name || u.email).join(", ");
    const skipNames = skipped.length
      ? `\n\nSkipped (accrual not started yet): ${skipped.map(u => u.name || u.email).join(", ")}`
      : "";
    if (!confirm(`Add 0.385 days (≈ 2.92h) of leave accrual to ${eligible.length} contractor(s)?\n\n${names}${skipNames}\n\nThis bumps each opening balance by one week. Use this as a manual one-off when end-of-week accrual needs to be applied regardless of timesheets.`)) return;
    try {
      const batch = writeBatch(db);
      eligible.forEach(u => {
        const current = u.openingBalanceDays || 0;
        batch.update(doc(db, "users", u.uid), { openingBalanceDays: +(current + 0.385).toFixed(3) });
      });
      await batch.commit();
      eligible.forEach(u => { u.openingBalanceDays = +((u.openingBalanceDays || 0) + 0.385).toFixed(3); });
      loadBalances();
      alert(`Added this week's accrual (0.385 days) to ${eligible.length} contractor(s).`);
    } catch (ex) {
      alert("Failed: " + (ex.message || ex.code));
    }
  });

  loadCalendar();
  startPendingLive();
  loadUpcoming();
  loadBalances();
  loadHistory();
</script>
</body>
</html>
