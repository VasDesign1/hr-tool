<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Payroll — HR Tool Admin</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="../assets/styles.css">
</head>
<body>
<header class="topbar"></header>

<main>
  <div class="card">
    <div class="toolbar">
      <h2>Pay period</h2>
      <div class="row">
        <button class="ghost" id="prevMonth">‹ Prev</button>
        <span id="periodLabel" style="min-width:160px; text-align:center; font-weight:600"></span>
        <button class="ghost" id="nextMonth">Next ›</button>
        <button class="ghost" id="thisMonth">This month</button>
      </div>
    </div>

    <div id="summary" class="row" style="gap:32px; margin-bottom:14px; color:var(--muted)"></div>

    <div id="payTable" class="empty">Loading…</div>

    <div class="row" style="justify-content:space-between; margin-top:18px">
      <div class="muted" style="font-size:12px">Period: <span id="periodRange">—</span></div>
      <div class="row">
        <button class="ghost" id="csvBtn">Export CSV for HR company</button>
        <button id="finaliseBtn">Generate / refresh payslips</button>
      </div>
    </div>
  </div>

  <div class="card">
    <h2>Past pay periods</h2>
    <div id="historyList" class="empty">Loading…</div>
  </div>
</main>

<script type="module">
  import { db } from "../assets/firebase-init.js";
  import { requireRole } from "../assets/auth-router.js";
  import { renderAdminNav, escapeHtml } from "../assets/admin-nav.js";
  import { fmtHours, melDateKey } from "../assets/time.js";
  import {
    currentPeriodFor, shiftPeriod, periodLabel, periodIdFor,
    fmtAUD, buildPayrollCsv, downloadCsv
  } from "../assets/pay.js";
  import {
    collection, query, where, getDocs, doc, setDoc, getDoc, updateDoc, serverTimestamp
  } from "https://www.gstatic.com/firebasejs/10.13.0/firebase-firestore.js";

  const { profile } = await requireRole("admin");
  renderAdminNav(profile, "payroll");

  let period = currentPeriodFor(melDateKey());

  // ---- Contractors once ----
  const usnap = await getDocs(query(collection(db, "users"), where("role", "==", "contractor")));
  const contractors = [];
  usnap.forEach(d => contractors.push({ uid: d.id, ...d.data() }));
  contractors.sort((a, b) => (a.name || "").localeCompare(b.name || ""));

  // ---- Period nav ----
  function setPeriod(p) {
    period = p;
    document.getElementById("periodLabel").textContent = periodLabel(period);
    document.getElementById("periodRange").textContent = `${period.start} → ${period.end}`;
    load();
  }
  document.getElementById("prevMonth").addEventListener("click", () => setPeriod(shiftPeriod(period.start, -1)));
  document.getElementById("nextMonth").addEventListener("click", () => setPeriod(shiftPeriod(period.start, 1)));
  document.getElementById("thisMonth").addEventListener("click", () => setPeriod(currentPeriodFor(melDateKey())));

  // ---- Main load: compute rows for the selected period ----
  let currentRows = [];

  async function load() {
    const tableEl = document.getElementById("payTable");
    tableEl.classList.remove("empty");
    tableEl.innerHTML = `<div class="empty">Loading…</div>`;

    const active = contractors.filter(c => c.active !== false);

    let rows;
    try {
      // Hours per contractor: filter date range in JS to avoid composite-index dependency
      rows = await Promise.all(active.map(async (c) => {
        const teSnap = await getDocs(query(
          collection(db, "timeEntries"),
          where("uid", "==", c.uid)
        ));
        let hours = 0;
        teSnap.forEach(d => {
          const e = d.data();
          if (e.date >= period.start && e.date <= period.end && e.hoursWorked) {
            hours += e.hoursWorked;
          }
        });

        const ppId = periodIdFor(c.uid, period);
        const ppSnap = await getDoc(doc(db, "payPeriods", ppId));
        const pp = ppSnap.exists() ? ppSnap.data() : null;

        return {
          uid: c.uid,
          name: c.name || c.email,
          email: c.email,
          payAmount: c.payAmount ?? 0,
          hoursWorked: pp ? pp.hoursWorked : hours,
          grossAmount: pp ? pp.grossAmount : (c.payAmount ?? 0),
          status: pp ? pp.status : "draft",
          finalisedAt: pp?.finalisedAt,
          paidAt: pp?.paidAt
        };
      }));
    } catch (ex) {
      console.error("Payroll load failed:", ex);
      tableEl.innerHTML = `<div class="empty" style="color:var(--bad)">Could not load: ${escapeHtml(ex.message || ex.code || String(ex))}</div>`;
      return;
    }
    currentRows = rows;

    const totalHours = rows.reduce((s, r) => s + r.hoursWorked, 0);
    const totalGross = rows.reduce((s, r) => s + r.grossAmount, 0);
    document.getElementById("summary").innerHTML = `
      <div><div style="font-size:11px; text-transform:uppercase; letter-spacing:.06em">Contractors</div><div style="font-size:20px; color:var(--text); font-weight:700">${rows.length}</div></div>
      <div><div style="font-size:11px; text-transform:uppercase; letter-spacing:.06em">Total hours</div><div style="font-size:20px; color:var(--text); font-weight:700">${fmtHours(totalHours)}</div></div>
      <div><div style="font-size:11px; text-transform:uppercase; letter-spacing:.06em">Total gross</div><div style="font-size:20px; color:var(--text); font-weight:700">${fmtAUD(totalGross)}</div></div>
    `;

    if (rows.length === 0) {
      tableEl.innerHTML = `<div class="empty">No active contractors.</div>`;
      return;
    }

    tableEl.innerHTML = `
      <table class="data">
        <thead>
          <tr>
            <th>Name</th><th>Hours</th><th>Monthly amount</th><th>Gross</th><th>Status</th><th></th>
          </tr>
        </thead>
        <tbody>
          ${rows.map(r => {
            const badge = r.status === "paid"      ? `<span class="badge ok">Paid</span>`
                        : r.status === "finalised" ? `<span class="badge pending">Finalised</span>`
                        : `<span class="badge off">Draft</span>`;
            const actionBtn = r.status === "finalised"
              ? `<button class="ghost" data-act="paid" data-uid="${r.uid}">Mark paid</button>`
              : r.status === "paid"
                ? `<button class="ghost" data-act="unpaid" data-uid="${r.uid}">Undo paid</button>`
                : "";
            return `<tr>
              <td>${escapeHtml(r.name)}</td>
              <td>${fmtHours(r.hoursWorked)}</td>
              <td>${fmtAUD(r.payAmount)}</td>
              <td><strong>${fmtAUD(r.grossAmount)}</strong></td>
              <td>${badge}</td>
              <td>${actionBtn}</td>
            </tr>`;
          }).join("")}
        </tbody>
      </table>
    `;

    tableEl.querySelectorAll("button[data-act]").forEach(btn => {
      btn.addEventListener("click", () => handleRowAction(btn.dataset.act, btn.dataset.uid));
    });
  }

  async function handleRowAction(act, uid) {
    const ppId = periodIdFor(uid, period);
    const ref = doc(db, "payPeriods", ppId);
    if (act === "paid") {
      await updateDoc(ref, { status: "paid", paidAt: serverTimestamp() });
    } else if (act === "unpaid") {
      await updateDoc(ref, { status: "finalised", paidAt: null });
    }
    load();
  }

  // ---- Generate / refresh ----
  document.getElementById("finaliseBtn").addEventListener("click", async () => {
    if (!confirm(`Generate or refresh payslips for ${periodLabel(period)}? Existing draft amounts will be locked in as 'finalised'. Already-paid rows are not touched.`)) return;
    const btn = document.getElementById("finaliseBtn");
    btn.disabled = true; btn.textContent = "Working…";
    try {
      for (const r of currentRows) {
        if (r.status === "paid") continue;
        const ppId = periodIdFor(r.uid, period);
        await setDoc(doc(db, "payPeriods", ppId), {
          uid: r.uid,
          contractorName: r.name,
          contractorEmail: r.email,
          periodStart: period.start,
          periodEnd: period.end,
          year: period.year,
          month: period.month,
          hoursWorked: r.hoursWorked,
          monthlyAmount: r.payAmount,
          grossAmount: r.grossAmount,
          status: "finalised",
          finalisedAt: serverTimestamp(),
          finalisedBy: profile.email
        }, { merge: true });
      }
      await load();
      await loadHistory();
    } catch (ex) {
      alert("Failed: " + (ex.message || ex.code));
    } finally {
      btn.disabled = false; btn.textContent = "Generate / refresh payslips";
    }
  });

  // ---- CSV export ----
  document.getElementById("csvBtn").addEventListener("click", () => {
    if (currentRows.length === 0) { alert("No rows to export."); return; }
    const csv = buildPayrollCsv(currentRows, period);
    const fname = `vicair-payroll-${period.year}-${String(period.month).padStart(2, "0")}.csv`;
    downloadCsv(fname, csv);
  });

  // ---- History (recent past periods, grouped) ----
  async function loadHistory() {
    const listEl = document.getElementById("historyList");
    listEl.innerHTML = `<div class="empty">Loading…</div>`;
    const snap = await getDocs(collection(db, "payPeriods"));
    const all = [];
    snap.forEach(d => all.push({ id: d.id, ...d.data() }));
    if (all.length === 0) {
      listEl.classList.add("empty");
      listEl.innerHTML = "No finalised pay periods yet.";
      return;
    }
    // Group by period key
    const byPeriod = {};
    for (const p of all) {
      const key = `${p.year}-${String(p.month).padStart(2,"0")}`;
      (byPeriod[key] ||= []).push(p);
    }
    const sorted = Object.entries(byPeriod).sort((a, b) => b[0].localeCompare(a[0]));
    listEl.classList.remove("empty");
    listEl.innerHTML = `<table class="data">
      <thead><tr><th>Period</th><th>Contractors</th><th>Total hours</th><th>Total gross</th><th>Paid / Total</th></tr></thead>
      <tbody>${sorted.map(([key, group]) => {
        const [y, m] = key.split("-").map(Number);
        const lbl = periodLabel({ year: y, month: m });
        const hrs = group.reduce((s, r) => s + (r.hoursWorked || 0), 0);
        const gross = group.reduce((s, r) => s + (r.grossAmount || 0), 0);
        const paid = group.filter(r => r.status === "paid").length;
        return `<tr>
          <td>${lbl}</td>
          <td>${group.length}</td>
          <td>${fmtHours(hrs)}</td>
          <td>${fmtAUD(gross)}</td>
          <td>${paid} / ${group.length}</td>
        </tr>`;
      }).join("")}</tbody>
    </table>`;
  }

  setPeriod(period);
  loadHistory();
</script>
</body>
</html>
